name: Agentic Repo Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate agent-ready repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff
        run: |
          ruff check .

      - name: Run agentic governance validation
        run: |
          python scripts/validate_agentic_repo.py

      - name: Run tests
        run: |
          pytest -q
